name: Deploy API to Azure Functions

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_FUNCTIONAPP_NAME: te-waihora-api
  AZURE_FUNCTIONAPP_PACKAGE_PATH: api
  PYTHON_VERSION: "3.12"

concurrency:
  group: deploy-api
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Azure/functions-action uses the Kudu zip-deploy path, which doesn't
      # actually deploy anything on a Flex Consumption plan (it reports
      # success but registers zero functions). The func CLI talks to the
      # Flex Consumption deployment API correctly, so use that instead.
      - name: Publish to Azure Functions
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        run: func azure functionapp publish ${{ env.AZURE_FUNCTIONAPP_NAME }} --python
